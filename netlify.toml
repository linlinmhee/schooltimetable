# Netlify configuration for the Timetable Decorator static site.
# The site is plain HTML/JS at the repo root; Azure calls go through a
# serverless function so the API key never reaches the browser.

[build]
  publish = "."

# Tell Netlify's secret scanner which env vars are NOT secrets. The API
# version, deployment names, and endpoint host are public Azure identifiers
# that legitimately appear in code/comments/UI strings — only the actual
# API key needs scanning. Without this, the build fails because non-secret
# env var values match strings in committed files.
[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "AZURE_OPENAI_API_VERSION,AZURE_OPENAI_CHAT_DEPLOYMENT,AZURE_OPENAI_IMAGE_DEPLOYMENT,AZURE_OPENAI_ENDPOINT"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# NOTE on function timeout: it cannot be set in netlify.toml. The default
# sync timeout is 10 s, configurable up to 26 s in
#   Site settings → Functions → Settings → "Function timeout".
# gpt-image-2 at quality:"high" can exceed 26 s — if that happens, either
# lower image quality in azure.js (high → medium) or migrate the image
# call to a Background Function.
